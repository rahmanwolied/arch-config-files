# Application bindings
$terminal = uwsm app -- $TERMINAL
$browser = omarchy-launch-or-focus zen-browser
$cursor = /opt/cursor.appimage
$edit_config = $cursor ~/.config/

bindd = SUPER, return, Terminal, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER, F, File manager, exec, uwsm app -- nautilus --new-window
bindd = SUPER, B, Browser, exec, $browser
bindd = SUPER SHIFT, B, Browser (private), exec, $browser --private
bindd = SUPER, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER, N, Editor, exec, omarchy-launch-editor
bindd = SUPER, T, Activity, exec, $terminal -e btop
bindd = SUPER, D, Docker, exec, $terminal -e lazydocker
bindd = SUPER, G, Github, exec, omarchy-launch-or-focus-webapp Github "https://github.com/"
bindd = SUPER, O, Obsidian, exec, omarchy-launch-or-focus obsidian "uwsm app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER, slash, Passwords, exec, uwsm app -- 1password
bindd = SUPER, C, Cursor, exec, omarchy-launch-or-focus cursor "$cursor"
bindd = SUPER SHIFT, C, Cursor, exec, omarchy-launch cursor "$cursor"
bindd = SUPER ALT, C, Edit Config, exec, $edit_config

# If your web app url contains #, type it as ## to prevent hyperland treat it as comments
bindd = SUPER, A, ChatGPT, exec, omarchy-launch-or-focus-webapp ChatGPT "https://chatgpt.com"
bindd = SUPER SHIFT, A, Grok, exec, omarchy-launch-webapp "https://claude.com"
bindd = SUPER, E, Email, exec, omarchy-launch-webapp "https://mail.google.com/mail"
bindd = SUPER, Y, YouTube, exec, omarchy-launch-or-focus-webapp YouTube "https://youtube.com/"
bindd = SUPER, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER, S, Slack, exec, omarchy-launch-or-focus-webapp Slack "https://app.slack.com/client/T086JAYN4FK"
bindd = SUPER SHIFT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu
unbind = SUPER, W  # Unbind default close window to use for WhatsApp
bindd = SUPER, W, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"

# Window management
bindd = SUPER, Q, Close active window, exec, DEBUG=1 ~/.config/hypr/scripts/close-and-track.sh
bindd = SUPER SHIFT, Q, Reopen last closed window, exec, ~/.config/hypr/scripts/reopen-window-debug.sh
bind = CTRL ALT, return, fullscreen, 0
bindd = SUPER SHIFT, N, Move window to new workspace, movetoworkspace, empty


# Mouse bindings for window control
# bindm = SUPER, mouse:272, movewindow    # Hold Super + Left click to drag windows
bindm = SUPER, mouse:273, resizewindow  # Hold Super + Right click to resize windows

